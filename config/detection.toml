# 検知パラメータ(ROI・色閾値)の設定ファイル。
#
# 各値はPython側のデフォルト値と同じものを初期値として書き込んである。
# fixture実測に基づく根拠のコメントは詳細を失わないよう
# src/nss_tracker/detection/配下の各モジュールのコメント側に残しているので、
# 値の意味を知りたい場合はそちらを参照すること。
#
# キー・セクションが存在しない、またはこのファイル自体が存在しない場合は、
# 各detectionモジュールのPythonデフォルト値にフォールバックする
# (src/nss_tracker/detection_config.py参照)。
#
# 実機の発色特性・キャプチャ環境の違いで値がズレる場合は、このファイルの
# 該当する値のみを直接書き換えればよい(コードの変更は不要)。

